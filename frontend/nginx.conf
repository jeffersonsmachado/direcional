server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # O coração da solução para SPAs (React/Angular/Vue)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de arquivos estáticos (opcional, mas recomendado para performance)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: direcional-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Direcional@2026"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "Direcional@2026",
          "-Q",
          "SELECT 1",
          "-No",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: direcional-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=Direcional;User Id=sa;Password=Direcional@2026;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
